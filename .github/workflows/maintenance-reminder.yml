name: Maintenance reminder

# Opens a monthly maintenance issue so this repo does not silently rot.
# Manual run is also possible via the "Run workflow" button.
on:
  schedule:
    - cron: "0 0 1 * *" # 1st of each month, 00:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Open monthly maintenance issue
        uses: actions/github-script@v7
        with:
          script: |
            const month = new Date().toISOString().slice(0, 7);
            const body = [
              'Monthly maintenance pass for this repository.',
              '',
              '- [ ] Dependencies: review Dependabot PRs, merge when CI is green',
              '- [ ] Security: `npm audit` / Dependabot alerts — leave no dangerous advisory open',
              '- [ ] Build: `npm run lint`, `npx tsc --noEmit`, and `npm run build` pass',
              '- [ ] README freshness: supported versions and any "last verified" notes are current',
              '- [ ] Issue/PR triage: respond to anything inbound (MIT, as-is, no SLA)',
              '',
              'Close this issue when the pass is done.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Maintenance check — ${month}`,
              body,
            });
